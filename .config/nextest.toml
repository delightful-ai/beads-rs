[store]
dir = "target/nextest"

[test-groups]
tailnet-fault-injection = { max-threads = 1 }

[profile.default]
retries = 0
test-threads = 4
failure-output = "immediate-final"
success-output = "never"
status-level = "pass"
final-status-level = "slow"
slow-timeout = { period = "30s", terminate-after = 4, grace-period = "10s" }

[[profile.default.overrides]]
filter = 'package(beads-rs) and test(/^daemon::repl_e2e::repl_.*tailnet.*$/)'
test-group = 'tailnet-fault-injection'
# These tests still serialize against each other, but they no longer need to
# monopolize the entire runner once the REPL convergence helper stops polling
# full admin status payloads on every iteration.

[profile.default.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

[profile.fast]
status-level = "pass"
final-status-level = "slow"

[[profile.fast.overrides]]
filter = 'package(beads-rs) and test(/^daemon::repl_e2e::repl_.*tailnet.*$/)'
test-group = 'tailnet-fault-injection'

[profile.fast.junit]
path = "junit.xml"

[profile.slow]
status-level = "slow"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 2, grace-period = "15s" }

[[profile.slow.overrides]]
filter = 'package(beads-rs) and test(/^daemon::repl_e2e::repl_.*tailnet.*$/)'
test-group = 'tailnet-fault-injection'
threads-required = "num-test-threads"

[profile.slow.junit]
path = "junit.xml"
