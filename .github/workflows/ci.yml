name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  migration-compat:
    name: Migration Compat
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p beads-rs --test integration cli::migration::test_migrate_to_1_upgrades_exact_v0_1_26_store_without_data_loss -- --exact

  test:
    name: Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo xtest --no-fail-fast --status-level none --final-status-level slow -E 'not (package(beads-daemon) and test(/^private_field_compile_fail_guards_acknowledgement_apis$/))'

  test-slow:
    name: Test (slow)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --profile slow --workspace --all-features --features slow-tests --no-fail-fast --status-level none --final-status-level slow -E 'not (package(beads-daemon) and test(/^private_field_compile_fail_guards_acknowledgement_apis$/))'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint-${{ runner.os }}
          workspaces: |
            . -> target
            lints -> lints/target
          cache-directories: |
            ~/.dylint_drivers
          cache-all-crates: true
      - run: cargo install cargo-dylint dylint-link --locked
      - run: cargo fmt --all -- --check
      - run: cargo dylint --path lints --pattern beads_lints --all
      - run: cargo clippy --all-features -- -D warnings -D clippy::match_wildcard_for_single_variants -D clippy::wildcard_in_or_patterns
